<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>英語長文学習アプリ</title>
    <style>
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            line-height: 1.6;
            background-color: #f5f7fa;
            color: #333;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: #fff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            position: relative;
        }
        .header-area {
            text-align: center;
            margin-bottom: 30px;
            padding-right: 100px;
            padding-left: 100px;
        }
        h1 {
            color: #2c3e50;
            font-size: 1.5rem;
            margin: 0;
        }
        .nav-home-btn {
            position: absolute;
            top: 25px;
            right: 30px;
            background-color: #fff;
            color: #78909c;
            border: 2px solid #cfd8dc;
            padding: 6px 14px;
            font-size: 0.85rem;
            font-weight: bold;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .nav-home-btn:hover {
            background-color: #f4f6f7;
            color: #37474f;
            border-color: #b0bec5;
        }
        .mode-info {
            background-color: #e8f4fd;
            color: #1e88e5;
            padding: 12px;
            border-radius: 8px;
            font-weight: bold;
            text-align: center;
            margin-bottom: 20px;
        }
        .text-container {
            font-size: 1.3rem;
            letter-spacing: 0.05em;
            word-wrap: break-word;
            margin: 40px 0;
            min-height: 50px;
            text-align: left;
            padding: 0 10px;
        }
        .word-span {
            display: inline-block;
            position: relative;
            cursor: pointer;
            padding: 4px 4px;
            margin-right: 16px;
            border-radius: 4px;
            transition: all 0.2s;
        }
        .word-span:hover:not(.locked) {
            background-color: #e0f2fe;
        }
        
        /* 【通常状態】ユーザーが引いたスラッシュ（赤） */
        .word-span.has-slash::after {
            content: "/";
            position: absolute;
            right: -12px;
            top: 0;
            font-weight: bold;
            color: #ff5252;
            font-size: 1.5rem;
            z-index: 10;
        }

        /* 【答え合わせ後：正解】スラッシュを緑にして固定 */
        .word-span.correct-slash::after {
            content: "/";
            position: absolute;
            right: -12px;
            top: 0;
            font-weight: bold;
            color: #2cc780 !important;
            font-size: 1.5rem;
            z-index: 10;
        }
        .word-span.locked {
            cursor: default;
        }

        /* 【答え合わせ後：不正解】スラッシュをオレンジに */
        .word-span.wrong-slash::after {
            content: "/";
            position: absolute;
            right: -12px;
            top: 0;
            font-weight: bold;
            color: #ffa726 !important;
            font-size: 1.5rem;
            z-index: 10;
        }

        .line-break {
            display: block;
            margin-top: 15px;
            height: 0;
        }
        .btn-container {
            text-align: center;
            margin-top: 25px;
            display: flex;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
        }
        button {
            background-color: #2cc780;
            color: white;
            border: none;
            padding: 12px 25px;
            font-size: 0.95rem;
            font-weight: bold;
            border-radius: 25px;
            cursor: pointer;
            box-shadow: 0 3px 6px rgba(0,0,0,0.1);
            transition: all 0.2s;
        }
        button:hover {
            background-color: #21a769;
        }
        button.sub-btn {
            background-color: #90a4ae;
        }
        button.sub-btn:hover {
            background-color: #78909c;
        }
        /* 正解表示ボタン（水色） */
        button.show-ans-btn {
            background-color: #29b6f6;
        }
        button.show-ans-btn:hover {
            background-color: #039be5;
        }
        /* 正解非表示ボタン（オレンジに変えて目立たせます） */
        button.hide-ans-btn {
            background-color: #ffb74d;
        }
        button.hide-ans-btn:hover {
            background-color: #f57c00;
        }
        
        /* フェーズ2：直読直解ブロック */
        .phrase-block {
            margin-bottom: 25px;
            padding: 15px;
            border-left: 4px solid #b0bec5;
            background-color: #fafafa;
            cursor: pointer;
            border-radius: 0 8px 8px 0;
            transition: all 0.3s;
        }
        .phrase-block:hover {
            background-color: #f0f4f8;
            border-left-color: #1e88e5;
        }
        .phrase-english {
            font-size: 1.3rem;
            font-weight: 500;
            color: #2c3e50;
        }
        .phrase-translation {
            margin-top: 8px;
            font-size: 1.1rem;
            color: #43a047;
            font-weight: bold;
            display: none;
        }
        .phrase-block.cleared {
            border-left-color: #43a047;
            background-color: #e8f5e9;
        }
        .phrase-block.cleared .phrase-translation {
            display: block;
        }
    </style>
</head>
<body>

<div class="container">
    <button id="nav-home" class="nav-home-btn" onclick="confirmGoHome()" style="display:none;">ホームへ戻る</button>

    <div class="header-area">
        <h1>英語長文学習アプリ</h1>
    </div>
    
    <div id="mode-badge" class="mode-info">
        データを読み込み中...
    </div>

    <div id="main-content"></div>

    <div id="btn-area" class="btn-container"></div>
</div>

<script>
// ==========================================================================
// 🛠️ 必須設定: Google Apps Script（GAS）でデプロイした「ウェブアプリのURL」を貼り付けてください
// ==========================================================================
const SPREADSHEET_GAS_URL = "https://script.google.com/macros/s/AKfycbx1fgY1v0ZToAX7F_vlw02fRml4bQ5VkCe7D5y7AZkJhLX_NOxBclgN7HCPeyKvQL3X/exec";

let allQuestions = [];      
let currentQuestion = { text: "", translations: "" };
let wordsArray = [];        
let correctSlashIndices = []; 

let questionPhrases = []; 
let translationPhrases = [];
let historicalClearedSet = new Set();

let isWordsArrayInitialized = false;

// 🔥 正解表示モードがONかOFFかを追跡する変数
let isAnswerRevealModeOn = false;

async function loadDataFromSpreadsheet() {
    if (SPREADSHEET_GAS_URL === "ここにデプロイしたウェブアプリのURLを貼り付け") {
        document.getElementById('mode-badge').innerText = "【設定エラー】コード内のSPREADSHEET_GAS_URLに、GASのウェブアプリURLを設定してください。";
        return;
    }

    try {
        const response = await fetch(SPREADSHEET_GAS_URL);
        allQuestions = await response.json();
        
        if (allQuestions.length > 0) {
            showHomeScreen();
        } else {
            document.getElementById('mode-badge').innerText = "スプレッドシートにデータが見つかりません。";
        }
    } catch (error) {
        console.error("データ取得エラー:", error);
        document.getElementById('mode-badge').innerText = "データの読み込みに失敗しました。GASのURLを確認してください。";
    }
}

function showHomeScreen() {
    document.getElementById('mode-badge').innerText = "【ホーム】学習したいレベルと文法を選んで「スタート」を押そう！";
    document.getElementById('btn-area').innerHTML = "";
    document.getElementById('nav-home').style.display = "none";

    const levels = [...new Set(allQuestions.map(q => q.level).filter(l => l))];
    const categories = [...new Set(allQuestions.map(q => q.category).filter(c => c))];

    let htmlMarkup = `
        <div class="home-container">
            <div class="select-group">
                <label for="level-select">学年・レベル</label>
                <select id="level-select">
                    ${levels.map(l => `<option value="${l}">${l}</option>`).join('')}
                </select>
            </div>
            <div class="select-group">
                <label for="category-select">文法カテゴリ</label>
                <select id="category-select">
                    ${categories.map(c => `<option value="${c}">${c}</option>`).join('')}
                </select>
            </div>
            <div class="btn-container" style="margin-top:40px;">
                <button onclick="startSelectedLesson()">この内容でスタート！</button>
            </div>
        </div>
    `;
    document.getElementById('main-content').innerHTML = htmlMarkup;
}

function startSelectedLesson() {
    const selectedLevel = document.getElementById('level-select').value;
    const selectedCategory = document.getElementById('category-select').value;
    const matchQuestion = allQuestions.find(q => q.level == selectedLevel && q.category == selectedCategory);

    if (matchQuestion) {
        currentQuestion.text = String(matchQuestion.text || "");
        currentQuestion.translations = String(matchQuestion.translations || "");
        
        wordsArray = [];
        correctSlashIndices = [];
        historicalClearedSet.clear();
        isWordsArrayInitialized = false; 
        isAnswerRevealModeOn = false; // 初期化
        
        parseQuestionsAndTranslations();
        showSlashPhase(); 
    } else {
        alert("該当する長文が見つかりませんでした。別の組み合わせを選んでください。");
    }
}

function parseQuestionsAndTranslations() {
    questionPhrases = [];
    translationPhrases = [];

    const rawTextLines = currentQuestion.text.split('\n');
    rawTextLines.forEach((line) => {
        const lineParts = line.split('/').map(p => p.trim()).filter(p => p !== "");
        lineParts.forEach((part, index) => {
            const isEndOfLine = (index === lineParts.length - 1);
            questionPhrases.push({
                text: part,
                appendLineBreak: isEndOfLine
            });
        });
    });

    const rawTranslationLines = currentQuestion.translations.split('\n');
    rawTranslationLines.forEach((line) => {
        const lineParts = line.split('/').map(p => p.trim()).filter(p => p !== "");
        lineParts.forEach((part) => {
            translationPhrases.push(part);
        });
    });
}

function confirmGoHome() {
    if (confirm("学習を途中でやめて、ホーム画面に戻りますか？")) {
        showHomeScreen();
    }
}

// フェーズ1（スラッシュ引き画面）の表示処理
function showSlashPhase() {
    document.getElementById('mode-badge').innerText = "【フェーズ1】正しいと思う区切り（単語の後ろ）をタップしてスラッシュを入れよう！";
    document.getElementById('nav-home').style.display = "inline-block";

    // 🛠️ ボタンの出し分けロジック（ON/OFFの状態によってボタンのテキストと色を変える）
    updateSlashButtons();

    if (!isWordsArrayInitialized) {
        let wordCounter = 0;
        let htmlMarkup = '<div class="text-container">';

        questionPhrases.forEach((phraseObj) => {
            const words = phraseObj.text.split(' ').filter(w => w !== "");

            words.forEach((word, wordIndex) => {
                wordsArray.push({
                    text: word,
                    hasUserSlash: false,
                    isCorrectSlashPosition: false,
                    isAlreadyCorrect: false,
                    backupUserSlash: false // トグル時に元の自分の解答を避難させておく変数
                });

                htmlMarkup += `<span class="word-span" id="word-${wordCounter}" onclick="toggleSlash(${wordCounter})">${word}</span>`;
                
                const isLastWord = words.slice(wordIndex + 1).filter(w => w !== '[BR]').length === 0;
                if (isLastWord && !wordsArray[wordCounter].isCorrectSlashPosition) {
                    correctSlashIndices.push(wordCounter);
                    wordsArray[wordCounter].isCorrectSlashPosition = true;
                }
                wordCounter++;
            });

            if (phraseObj.appendLineBreak) {
                htmlMarkup += '<span class="line-break"></span>';
            }
        });
        htmlMarkup += '</div>';
        document.getElementById('main-content').innerHTML = htmlMarkup;
        isWordsArrayInitialized = true;
    } else {
        applyWordStatesToDOM();
    }
}

// ボタン表示を更新する関数
function updateSlashButtons() {
    const btnArea = document.getElementById('btn-area');
    if (isAnswerRevealModeOn) {
        btnArea.innerHTML = `
            <button id="check-btn" onclick="checkSlashAnswers()" disabled style="background-color: #b0bec5; cursor: default;">スラッシュの答え合わせをする</button>
            <button class="hide-ans-btn" onclick="toggleCorrectSlashes()">正解を隠す（自分の解答に戻る）</button>
            <button class="sub-btn" onclick="startTranslationMode()">日本語訳を見て確認する ＞</button>
        `;
    } else {
        btnArea.innerHTML = `
            <button id="check-btn" onclick="checkSlashAnswers()">スラッシュの答え合わせをする</button>
            <button class="show-ans-btn" onclick="toggleCorrectSlashes()">正解を表示する</button>
            <button class="sub-btn" onclick="startTranslationMode()">日本語訳を見て確認する ＞</button>
        `;
    }
}

// 記憶データに基づいて画面（DOM）のクラスを再適用する関数
function applyWordStatesToDOM() {
    wordsArray.forEach((word, index) => {
        const wordElement = document.getElementById(`word-${index}`);
        wordElement.classList.remove('has-slash', 'correct-slash', 'wrong-slash', 'locked');
        
        if (isAnswerRevealModeOn) {
            // 正解表示モード中の見た目
            if (word.isCorrectSlashPosition) {
                wordElement.classList.add('correct-slash', 'locked');
            }
        } else {
            // 通常モード中の見た目
            if (word.isAlreadyCorrect) {
                wordElement.classList.add('correct-slash', 'locked');
            } else if (word.hasUserSlash) {
                wordElement.classList.add('has-slash');
            }
        }
    });
}

function toggleSlash(index) {
    // 正解表示モード中、またはすでに答え合わせで正解している単語はタップさせない
    if (isAnswerRevealModeOn || wordsArray[index].isAlreadyCorrect) return;

    const wordElement = document.getElementById(`word-${index}`);
    wordsArray[index].hasUserSlash = !wordsArray[index].hasUserSlash;
    wordElement.classList.remove('wrong-slash');

    if (wordsArray[index].hasUserSlash) {
        wordElement.classList.add('has-slash');
    } else {
        wordElement.classList.remove('has-slash');
    }
}

function checkSlashAnswers() {
    if (isAnswerRevealModeOn) return;

    let isAllCorrect = true;
    let wrongCount = 0;

    wordsArray.forEach((word, index) => {
        const wordElement = document.getElementById(`word-${index}`);
        wordElement.classList.remove('wrong-slash');

        if (word.isCorrectSlashPosition === word.hasUserSlash) {
            if (word.isCorrectSlashPosition) {
                word.isAlreadyCorrect = true;
                wordElement.classList.remove('has-slash');
                wordElement.classList.add('correct-slash', 'locked'); 
            }
        } else {
            isAllCorrect = false;
            wrongCount++;

            if (word.hasUserSlash) {
                wordElement.classList.remove('has-slash');
                wordElement.classList.add('wrong-slash');
            }
        }
    });

    if (isAllCorrect) {
        alert("素晴らしい！全問正解です！直読直解（日本語訳）モードに進みます。");
        startTranslationMode();
    } else {
        alert(`おや？スラッシュの位置が違うところが ${wrongCount} 箇所あります。\n見直してもう一度挑戦するか、「正解を表示する」ボタンで確認してみよう！`);
    }
}

// 🛠️ 【改良】正解の表示・非表示を切り替えるトグル関数
function toggleCorrectSlashes() {
    // モードを反転
    isAnswerRevealModeOn = !isAnswerRevealModeOn;

    wordsArray.forEach((word) => {
        if (isAnswerRevealModeOn) {
            // 【ONにするとき】現在の学習者の入力を一時バックアップ
            word.backupUserSlash = word.hasUserSlash;
            // 一時的に正解データへと書き換える
            if (word.isCorrectSlashPosition) {
                word.hasUserSlash = true;
            } else {
                word.hasUserSlash = false;
            }
        } else {
            // 【OFFにするとき】バックアップから元の状態を復元する
            word.hasUserSlash = word.backupUserSlash;
        }
    });

    // 画面の見た目（クラス）と、ボタンエリアの表示を更新
    applyWordStatesToDOM();
    updateSlashButtons();
}

// フェーズ2（直読直解モード）
function startTranslationMode() {
    document.getElementById('mode-badge').innerText = "【フェーズ2】英文をタップして日本語訳を確認しよう！（もう一度タップすると隠せます）";
    
    document.getElementById('btn-area').innerHTML = `
        <button class="sub-btn" onclick="showSlashPhase()">＜ スラッシュを引き直す</button>
        <button id="finish-btn" onclick="finishLearning()" style="background-color: #b0bec5;">学習を終了する</button>
    `;

    let htmlMarkup = '<div class="translation-mode-container">';
    
    questionPhrases.forEach((phraseObj, index) => {
        const jpn = translationPhrases[index] || "（日本語訳が正しく登録されていません）";
        htmlMarkup += `
            <div class="phrase-block" id="phrase-${index}" onclick="toggleTranslation(${index})">
                <div class="phrase-english">${phraseObj.text}</div>
                <div class="phrase-translation">${jpn}</div>
            </div>
        `;
    });

    htmlMarkup += '</div>';
    document.getElementById('main-content').innerHTML = htmlMarkup;
    
    checkAllPhrasesCleared();
}

function toggleTranslation(index) {
    const block = document.getElementById(`phrase-${index}`);
    const isShowing = block.classList.toggle('cleared');
    
    if (isShowing) {
        historicalClearedSet.add(index);
    }
    checkAllPhrasesCleared();
}

function checkAllPhrasesCleared() {
    const finishBtn = document.getElementById('finish-btn');
    if (!finishBtn) return;

    const total = document.querySelectorAll('.phrase-block').length;
    const clearedCount = historicalClearedSet.size; 
    
    if (total === clearedCount) {
        finishBtn.innerText = "すべての答え合わせが完了！終了する";
        finishBtn.style.backgroundColor = "#1e88e5";
    }
}

function finishLearning() {
    const total = questionPhrases.length;
    const clearedCount = historicalClearedSet.size;

    if (total !== clearedCount) {
        alert("まだ確認していない日本語訳があります。すべての区切りを一度はタップしてみましょう！");
        return;
    }
    
    alert("お疲れ様でした！ホーム画面に戻ります。");
    showHomeScreen(); 
}

window.onload = loadDataFromSpreadsheet;
</script>

</body>
</html>
