<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>English Reading App - Master Edition</title>
    <style>
        :root { --primary: #3498db; --success: #27ae60; --error: #e74c3c; --bg: #f4f7f6; --text: #333; }
        body { font-family: 'Helvetica Neue', Arial, sans-serif; background-color: var(--bg); margin: 0; padding: 20px; color: var(--text); -webkit-tap-highlight-color: transparent; }
        .container { max-width: 850px; margin: 0 auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); position: relative; }
        
        /* ホーム画面 */
        .home-screen { text-align: center; }
        .filter-group { margin: 25px 0; display: flex; flex-direction: column; gap: 15px; align-items: center; }
        select { padding: 12px; width: 280px; border-radius: 8px; border: 1px solid #ddd; font-size: 1rem; background: white; }
        .start-btn { background: var(--success); color: white; padding: 15px 50px; font-size: 1.2rem; border: none; border-radius: 30px; cursor: pointer; font-weight: bold; }
        
        /* リーディング画面 */
        .game-screen { display: none; }
        .info-bar { display: flex; justify-content: space-between; color: #666; margin-bottom: 15px; font-size: 0.9rem; border-bottom: 2px solid #f0f0f0; padding-bottom: 10px; }
        
        /* 精読用トグルスイッチのエリア */
        .toggle-container { display: flex; justify-content: center; gap: 15px; margin-bottom: 20px; background: #fff; padding: 10px; border-radius: 8px; border: 1px solid #eee; }
        .toggle-btn { background: #fff; border: 2px solid #ddd; padding: 8px 16px; border-radius: 20px; font-size: 0.9rem; cursor: pointer; font-weight: bold; transition: 0.2s; }
        .toggle-btn.active { background: var(--primary); color: white; border-color: var(--primary); }

        /* 英文表示エリア（1行ずつのブロック構造） */
        .question-text { font-size: 1.35rem; line-height: 1.8; margin-bottom: 30px; padding: 25px; border: 1px solid #eee; border-radius: 12px; background: #fff; }
        .sentence-line { margin-bottom: 25px; display: block; }
        
        /* チャンク構造 */
        .chunk-block { display: inline-block; vertical-align: top; margin-right: 2px; position: relative; }
        
        /* 直訳日本語のスタイル（デフォルト非表示） */
        .chunk-trans { display: none; font-size: 0.85rem; color: #7f8c8d; line-height: 1.2; margin-top: 4px; font-weight: normal; }
        
        /* スラッシュのスタイル（デフォルト非表示） */
        .chunk-slash { display: none; color: #bdc3c7; margin-left: 4px; font-weight: normal; user-select: none; }

        /* トグル連動CSS */
        .show-slash .chunk-slash { display: inline; }
        .show-slash .chunk-trans { display: block; }
        
        /* SVO色分け（トグル連動） */
        .show-color .word-s { color: #2980b9; font-weight: bold; border-bottom: 2px solid rgba(41, 128, 185, 0.2); }
        .show-color .word-v { color: #c0392b; font-weight: bold; border-bottom: 2px solid rgba(192, 57, 43, 0.2); }

        /* 辞書単語 */
        .clickable-word { cursor: pointer; color: inherit; padding: 0 1px; }
        .clickable-word:hover { background-color: #fff9c4; text-decoration: underline; }

        /* 辞書ツールチップ */
        #word-tooltip {
            position: absolute; display: none; background: rgba(0,0,0,0.9); color: #fff;
            padding: 10px 15px; border-radius: 8px; font-size: 0.95rem; z-index: 2000;
            pointer-events: none; text-align: center; min-width: 140px; transform: translateX(-50%);
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        .tooltip-read { display: block; font-size: 0.75rem; color: #3498db; margin-bottom: 4px; font-weight: bold; }

        .controls { text-align: center; margin-top: 30px; }
        .btn-next { background: var(--primary); color: white; padding: 12px 45px; border-radius: 30px; border: none; font-size: 1.1rem; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <div id="word-tooltip"></div>
    
    <div id="home-screen" class="home-screen">
        <h1>📝 English Reading App</h1>
        <div class="filter-group">
            <select id="grammar-select"><option value="all">すべての文法</option></select>
            <select id="level-select"><option value="all">すべてのレベル</option></select>
            <button class="start-btn" onclick="startLesson()">リーディングを開始</button>
        </div>
        <div id="status-msg" style="margin-top:10px;">データを読み込み中...</div>
    </div>

    <div id="game-screen" class="game-screen">
        <div class="info-bar"><span id="info-grammar"></span><span id="info-level"></span></div>
        
        <div class="toggle-container">
            <button id="toggle-slash-btn" class="toggle-btn" onclick="toggleSlash()">チャンク直訳 /</button>
            <button id="toggle-color-btn" class="toggle-btn" onclick="toggleColor()">構造色分け (S/V)</button>
        </div>

        <div id="question-area" class="question-text"></div>
        
        <div class="controls">
            <button id="next-btn" class="btn-next" onclick="loadNextQuestion()">次の文章へ ➔</button><br>
            <button onclick="showHome()" style="background:#95a5a6; color:white; border:none; padding:8px 20px; border-radius:5px; margin-top:20px; cursor:pointer;">戻る</button>
        </div>
    </div>
</div>

<script>
    const API_URL = 'https://script.google.com/macros/s/AKfycbx1fgY1v0ZToAX7F_vlw02fRml4bQ5VkCe7D5y7AZkJhLX_NOxBclgN7HCPeyKvQL3X/exec'; // ★デプロイURLを貼り付けてください
    let allQuestions = [], dictionary = {}, filteredQuestions = [], currentData = null, hideTimeout = null;
    let isSlashOn = false, isColorOn = false;

    async function init() {
        try {
            const res = await fetch(API_URL);
            const data = await res.json();
            allQuestions = data.questions;
            dictionary = data.dictionary;
            populateSelect('grammar-select', 'grammar');
            populateSelect('level-select', 'level');
            document.getElementById('status-msg').innerText = "準備完了！";
        } catch (e) { document.getElementById('status-msg').innerText = "通信エラー"; }
    }

    function populateSelect(id, key) {
        const select = document.getElementById(id);
        const values = [...new Set(allQuestions.map(q => q[key] ? q[key].toString().trim() : ""))].filter(v => v !== "");
        values.sort().forEach(v => {
            const opt = document.createElement('option');
            opt.value = v; opt.innerText = v; select.appendChild(opt);
        });
    }

    function startLesson() {
        const gV = document.getElementById('grammar-select').value;
        const lV = document.getElementById('level-select').value;
        filteredQuestions = allQuestions.filter(q => (gV === 'all' || q.grammar == gV) && (lV === 'all' || q.level == lV));
        if (filteredQuestions.length === 0) return alert("該当する文章がありません");
        document.getElementById('home-screen').style.display = 'none';
        document.getElementById('game-screen').style.display = 'block';
        loadNextQuestion();
    }

    function loadNextQuestion() {
        currentData = filteredQuestions[Math.floor(Math.random() * filteredQuestions.length)];
        document.getElementById('info-grammar').innerText = `ターゲット: ${currentData.grammar}`;
        document.getElementById('info-level').innerText = `レベル: ${currentData.level}`;
        renderQuestion(currentData);
    }

    // トグルスイッチの制御
    function toggleSlash() {
        isSlashOn = !isSlashOn;
        document.getElementById('toggle-slash-btn').classList.toggle('active', isSlashOn);
        document.getElementById('question-area').classList.toggle('show-slash', isSlashOn);
    }

    function toggleColor() {
        isColorOn = !isColorOn;
        document.getElementById('toggle-color-btn').classList.toggle('active', isColorOn);
        document.getElementById('question-area').classList.toggle('show-color', isColorOn);
    }

    function renderQuestion(item) {
        const qArea = document.getElementById('question-area');
        qArea.innerHTML = "";

        // 状態クラスの維持
        qArea.className = "question-text" + (isSlashOn ? " show-slash" : "") + (isColorOn ? " show-color" : "");

        // 改行（\n）で文章を行ごとに分割して処理
        const lines = item.text.split('\n');
        
        // ★修正箇所：日本語直訳リストをスラッシュ「/」で分割
        const allTranslations = item.translations ? item.translations.split('/') : [];
        let transIndex = 0;

        lines.forEach(line => {
            if (!line.trim()) return;

            const lineContainer = document.createElement('div');
            lineContainer.className = 'sentence-line';

            // 行内のスラッシュ「/」でチャンクに分解
            const chunks = line.split('/');
            
            chunks.forEach((chunk, cIdx) => {
                if (!chunk.trim() && cIdx === chunks.length - 1) return;

                const chunkBlock = document.createElement('span');
                chunkBlock.className = 'chunk-block';

                let processedText = chunk;
                
                // 熟語の事前処理（最長一致）
                const dictKeys = Object.keys(dictionary).sort((a, b) => b.length - a.length);
                dictKeys.forEach(phrase => {
                    if (phrase.includes(" ")) {
                        const regex = new RegExp(`(^|[^a-zA-Z'’])(${phrase})($|[^a-zA-Z'’])`, 'gi');
                        processedText = processedText.replace(regex, (match, p1, p2, p3) => `${p1}__PHRASE_${phrase.replace(/ /g, "_")}_[${p2}]__${p3}`);
                    }
                });

                // SタグとVタグの構造化処理
                processedText = processedText.replace(/\[S:(.*?)\]/g, "__S_START__$1__S_END__");
                processedText = processedText.replace(/\[V:(.*?)\]/g, "__V_START__$1__V_END__");

                let tokens = processedText.split(/(__S_START__.*?__S_END__|__V_START__.*?__V_END__|__PHRASE_.*?__|[a-zA-Z'’]+)/);
                
                tokens.forEach(token => {
                    if (!token) return;

                    if (token.startsWith("__S_START__")) {
                        const wordText = token.replace("__S_START__", "").replace("__S_END__", "");
                        chunkBlock.appendChild(createWordSpan(wordText, 'word-s'));
                    } else if (token.startsWith("__V_START__")) {
                        const wordText = token.replace("__V_START__", "").replace("__V_END__", "");
                        chunkBlock.appendChild(createWordSpan(wordText, 'word-v'));
                    } else if (token.startsWith("__PHRASE_")) {
                        const m = token.match(/^__PHRASE_(.*?)_\[(.*?)\]__$/);
                        const key = m[1].replace(/_/g, " ").toLowerCase();
                        const span = document.createElement('span');
                        span.className = 'clickable-word'; span.innerText = m[2];
                        span.onclick = (e) => showDict(e, key);
                        chunkBlock.appendChild(span);
                    } else if (token.match(/^[a-zA-Z'’]+$/)) {
                        const key = token.toLowerCase().replace(/[’]/g, "'");
                        if (dictionary[key]) {
                            const span = document.createElement('span');
                            span.className = 'clickable-word'; span.innerText = token;
                            span.onclick = (e) => showDict(e, key);
                            chunkBlock.appendChild(span);
                        } else { chunkBlock.appendChild(document.createTextNode(token)); }
                    } else {
                        chunkBlock.appendChild(document.createTextNode(token));
                    }
                });

                // チャンクの末尾にスラッシュマークを生成
                if (cIdx < chunks.length - 1) {
                    const slashSpan = document.createElement('span');
                    slashSpan.className = 'chunk-slash';
                    slashSpan.innerText = '/';
                    chunkBlock.appendChild(slashSpan);
                }

                // チャンクの下に潜り込ませる直訳日本語を生成
                const transSpan = document.createElement('div');
                transSpan.className = 'chunk-trans';
                transSpan.innerText = allTranslations[transIndex] ? allTranslations[transIndex].trim() : "";
                chunkBlock.appendChild(transSpan);
                transIndex++;

                lineContainer.appendChild(chunkBlock);
            });

            qArea.appendChild(lineContainer);
        });
    }

    function createWordSpan(text, structureClass) {
        const wrapper = document.createElement('span');
        wrapper.className = structureClass;
        
        let subTokens = text.split(/([a-zA-Z'’]+)/);
        subTokens.forEach(st => {
            if (st.match(/^[a-zA-Z'’]+$/)) {
                const key = st.toLowerCase().replace(/[’]/g, "'");
                if (dictionary[key]) {
                    const span = document.createElement('span');
                    span.className = 'clickable-word'; span.innerText = st;
                    span.onclick = (e) => showDict(e, key);
                    wrapper.appendChild(span);
                } else { wrapper.appendChild(document.createTextNode(st)); }
            } else {
                wrapper.appendChild(document.createTextNode(st));
            }
        });
        return wrapper;
    }

    function showDict(event, key) {
        event.stopPropagation();
        const cleanKey = key.toLowerCase().replace(/[’]/g, "'");
        const data = dictionary[cleanKey]; 
        if (!data) return;
        
        const tooltip = document.getElementById('word-tooltip');
        const readStr = data.read ? `<span class="tooltip-read">${data.read}</span>` : "";
        tooltip.innerHTML = readStr + data.mean;
        tooltip.style.display = 'block';
        
        const rect = event.target.getBoundingClientRect();
        tooltip.style.left = (rect.left + window.pageXOffset + rect.width/2) + 'px';
        tooltip.style.top = (rect.top + window.pageYOffset - tooltip.offsetHeight - 8) + 'px';
        
        if (hideTimeout) clearTimeout(hideTimeout);
        hideTimeout = setTimeout(() => tooltip.style.display = 'none', 3000);
    }

    function showHome() { 
        document.getElementById('home-screen').style.display = 'block'; 
        document.getElementById('game-screen').style.display = 'none'; 
    }
    
    document.onclick = () => document.getElementById('word-tooltip').style.display = 'none';
    init();
</script>
</body>
</html>
