<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>中学生向け 英語長文学習アプリ</title>
    <style>
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            line-height: 1.6;
            background-color: #f5f7fa;
            color: #333;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: #fff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }
        h1 {
            text-align: center;
            color: #2c3e50;
            font-size: 1.5rem;
            margin-bottom: 30px;
        }
        .mode-info {
            background-color: #e8f4fd;
            color: #1e88e5;
            padding: 12px;
            border-radius: 8px;
            font-weight: bold;
            text-align: center;
            margin-bottom: 20px;
        }
        /* ホーム画面用のスタイル */
        .home-container {
            text-align: center;
            padding: 20px 0;
        }
        .select-group {
            margin-bottom: 20px;
        }
        .select-group label {
            display: block;
            font-weight: bold;
            margin-bottom: 8px;
            color: #555;
        }
        select {
            width: 80%;
            max-width: 300px;
            padding: 10px;
            font-size: 1rem;
            border: 2px solid #b0bec5;
            border-radius: 8px;
            background: white;
            cursor: pointer;
        }
        /* フェーズ1：英文表示エリア */
        .text-container {
            font-size: 1.3rem;
            letter-spacing: 0.05em;
            word-wrap: break-word;
            margin: 40px 0;
            min-height: 50px;
            text-align: left; /* 長文の改行が見やすくなるよう左寄せに */
            padding: 0 10px;
        }
        /* フェーズ1：単語のスタイル */
        .word-span {
            display: inline-block;
            position: relative;
            cursor: pointer;
            padding: 4px 4px;
            margin-right: 4px;
            border-radius: 4px;
            transition: background-color 0.2s;
        }
        .word-span:hover {
            background-color: #e0f2fe;
        }
        .word-span.has-slash::after {
            content: "/";
            position: absolute;
            right: -6px;
            top: 0;
            font-weight: bold;
            color: #ff5252;
            font-size: 1.5rem;
            z-index: 10;
        }
        /* 改行用の特殊なスタイル */
        .line-break {
            display: block;
            margin-top: 15px;
            height: 0;
        }
        .btn-container {
            text-align: center;
            margin-top: 20px;
        }
        button {
            background-color: #2cc780;
            color: white;
            border: none;
            padding: 12px 30px;
            font-size: 1rem;
            font-weight: bold;
            border-radius: 25px;
            cursor: pointer;
            box-shadow: 0 3px 6px rgba(0,0,0,0.1);
            transition: background-color 0.2s;
        }
        button:hover {
            background-color: #21a769;
        }
        /* フェーズ2：直読直解ブロック */
        .phrase-block {
            margin-bottom: 25px;
            padding: 15px;
            border-left: 4px solid #b0bec5;
            background-color: #fafafa;
            cursor: pointer;
            border-radius: 0 8px 8px 0;
            transition: all 0.3s;
        }
        .phrase-block:hover {
            background-color: #f0f4f8;
            border-left-color: #1e88e5;
        }
        .phrase-english {
            font-size: 1.3rem;
            font-weight: 500;
            color: #2c3e50;
        }
        .phrase-translation {
            margin-top: 8px;
            font-size: 1.1rem;
            color: #43a047;
            font-weight: bold;
            display: none;
        }
        .phrase-block.cleared {
            border-left-color: #43a047;
            background-color: #e8f5e9;
        }
        .phrase-block.cleared .phrase-translation {
            display: block;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>中学生向け 英語長文学習アプリ</h1>
    
    <div id="mode-badge" class="mode-info">
        データを読み込み中...
    </div>

    <div id="main-content"></div>

    <div class="btn-container">
        <button id="action-btn" onclick="checkSlashAnswers()" style="display:none;">スラッシュの答え合わせをする</button>
    </div>
</div>

<script>
// ==========================================================================
// 🛠️ 必須設定: 先ほどGoogle Apps Script（GAS）でデプロイした「ウェブアプリのURL」を貼り付けてください
// ==========================================================================
const SPREADSHEET_GAS_URL = "https://script.google.com/macros/s/AKfycbx1fgY1v0ZToAX7F_vlw02fRml4bQ5VkCe7D5y7AZkJhLX_NOxBclgN7HCPeyKvQL3X/exec";

// アプリ内部で保持する変数
let allQuestions = [];      // スプレッドシートから取得した全データ
let currentQuestion = { text: "", translations: "" };
let wordsArray = [];        
let correctSlashIndices = []; 

// 1. GAS経由でスプレッドシートからデータを取得
async function loadDataFromSpreadsheet() {
    if (SPREADSHEET_GAS_URL === "ここにデプロイしたウェブアプリのURLを貼り付け") {
        document.getElementById('mode-badge').innerText = "【設定エラー】コード内のSPREADSHEET_GAS_URLに、GASのウェブアプリURLを設定してください。";
        return;
    }

    try {
        const response = await fetch(SPREADSHEET_GAS_URL);
        allQuestions = await response.json();
        
        if (allQuestions.length > 0) {
            // ホーム画面（選択画面）を表示
            showHomeScreen();
        } else {
            document.getElementById('mode-badge').innerText = "スプレッドシートにデータが見つかりません。";
        }
    } catch (error) {
        console.error("データ取得エラー:", error);
        document.getElementById('mode-badge').innerText = "データの読み込みに失敗しました。GASのURLを確認してください。";
    }
}

// 2. ホーム画面（レベル・カテゴリ選択画面）の表示
function showHomeScreen() {
    document.getElementById('mode-badge').innerText = "【ホーム】学習したいレベルと文法を選んで「スタート」を押そう！";
    document.getElementById('action-btn').style.display = "none";

    // 重複のないレベルとカテゴリのリストを自動作成
    const levels = [...new Set(allQuestions.map(q => q.level).filter(l => l))];
    const categories = [...new Set(allQuestions.map(q => q.category).filter(c => c))];

    let htmlMarkup = `
        <div class="home-container">
            <div class="select-group">
                <label for="level-select">学年・レベル</label>
                <select id="level-select">
                    ${levels.map(l => `<option value="${l}">${l}</option>`).join('')}
                </select>
            </div>
            <div class="select-group">
                <label for="category-select">文法カテゴリ</label>
                <select id="category-select">
                    ${categories.map(c => `<option value="${c}">${c}</option>`).join('')}
                </select>
            </div>
            <div class="btn-container" style="margin-top:40px;">
                <button onclick="startSelectedLesson()">この内容でスタート！</button>
            </div>
        </div>
    `;
    document.getElementById('main-content').innerHTML = htmlMarkup;
}

// 選ばれたレッスンを検索して開始
function startSelectedLesson() {
    const selectedLevel = document.getElementById('level-select').value;
    const selectedCategory = document.getElementById('category-select').value;

    // 条件に一致する問題を1つ探す
    const matchQuestion = allQuestions.find(q => q.level == selectedLevel && q.category == selectedCategory);

    if (matchQuestion) {
        currentQuestion.text = String(matchQuestion.text || "");
        currentQuestion.translations = String(matchQuestion.translations || "");
        
        // 変数をリセットしてフェーズ1へ
        wordsArray = [];
        correctSlashIndices = [];
        initApp();
    } else {
        alert("該当する長文が見つかりませんでした。別の組み合わせを選んでください。");
    }
}

// 3. フェーズ1（スラッシュ引き）画面の構築
function initApp() {
    document.getElementById('mode-badge').innerText = "【フェーズ1】正しいと思う区切り（単語の後ろ）をタップしてスラッシュを入れよう！";
    
    const actionBtn = document.getElementById('action-btn');
    actionBtn.style.display = "inline-block";
    actionBtn.innerText = "スラッシュの答え合わせをする";
    actionBtn.setAttribute('onclick', 'checkSlashAnswers()');
    actionBtn.style.backgroundColor = "#2cc780";

    // 英文を「/」で区切りごとに分割
    const phrases = currentQuestion.text.split('/').map(p => p.trim()).filter(p => p !== "");
    
    let wordCounter = 0;
    let htmlMarkup = '<div class="text-container">';

    phrases.forEach((phrase) => {
        // ★ポイント：スプレッドシート内の「改行」を一時的な目印に置き換えて、単語分解時に巻き込まないようにする
        const cleanPhrase = phrase.replace(/\n/g, ' [BR] ');
        const words = cleanPhrase.split(' ').filter(w => w !== "");

        words.forEach((word, wordIndex) => {
            if (word === '[BR]') {
                // 改行コードがあれば、単語にせず強制的に改行用のタグを挟む
                htmlMarkup += '<span class="line-break"></span>';
                return;
            }

            wordsArray.push({
                text: word,
                hasUserSlash: false,
                isCorrectSlashPosition: false
            });

            htmlMarkup += `<span class="word-span" id="word-${wordCounter}" onclick="toggleSlash(${wordCounter})">${word}</span>`;
            
            // 改行タグなどを除いた、本当の最後の単語の後ろを正解位置にする
            // 後続に有効な単語がないかチェック
            const isLastWord = words.slice(wordIndex + 1).filter(w => w !== '[BR]').length === 0;
            if (isLastWord && !wordsArray[wordCounter].isCorrectSlashPosition) {
                correctSlashIndices.push(wordCounter);
                wordsArray[wordCounter].isCorrectSlashPosition = true;
            }
            wordCounter++;
        });
    });
    
    htmlMarkup += '</div>';
    document.getElementById('main-content').innerHTML = htmlMarkup;
}

// 単語をタップしたときの処理
function toggleSlash(index) {
    const wordElement = document.getElementById(`word-${index}`);
    wordsArray[index].hasUserSlash = !wordsArray[index].hasUserSlash;
    
    if (wordsArray[index].hasUserSlash) {
        wordElement.classList.add('has-slash');
    } else {
        wordElement.classList.remove('has-slash');
    }
}

// フェーズ1：答え合わせ
function checkSlashAnswers() {
    let isAllCorrect = true;

    wordsArray.forEach((word) => {
        if (word.isCorrectSlashPosition !== word.hasUserSlash) {
            isAllCorrect = false;
        }
    });

    if (isAllCorrect) {
        alert("素晴らしい！全問正解です！直読直解（日本語訳）モードに進みます。");
        startTranslationMode();
    } else {
        alert("おや？スラッシュの位置が少し違うようです。もう一度確認してみよう！\n（※今回は開発チェック用として、そのまま次のモードに進みます）");
        startTranslationMode();
    }
}

// 4. フェーズ2（直読直解モード）
function startTranslationMode() {
    document.getElementById('mode-badge').innerText = "【フェーズ2】英文をタップして、頭の中の日本語訳と答え合わせをしよう！";
    
    const btn = document.getElementById('action-btn');
    btn.innerText = "学習を終了する";
    btn.setAttribute('onclick', 'finishLearning()');
    btn.style.backgroundColor = "#b0bec5"; 

    // 英語と日本語を「/」で分解
    const englishPhrases = currentQuestion.text.split('/').map(p => p.trim()).filter(p => p !== "");
    const japanesePhrases = currentQuestion.translations.split('/').map(p => p.trim()).filter(p => p !== "");

    let htmlMarkup = '<div class="translation-mode-container">';
    
    englishPhrases.forEach((eng, index) => {
        const jpn = japanesePhrases[index] || "（日本語訳が正しく登録されていません）";
        // ★ポイント：直読直解モードの英文内の改行も <br> タグに変換して反映する
        const formattedEng = eng.replace(/\n/g, '<br>');
        
        htmlMarkup += `
            <div class="phrase-block" id="phrase-${index}" onclick="revealTranslation(${index})">
                <div class="phrase-english">${formattedEng}</div>
                <div class="phrase-translation">${jpn}</div>
            </div>
        `;
    });

    htmlMarkup += '</div>';
    document.getElementById('main-content').innerHTML = htmlMarkup;
}

function revealTranslation(index) {
    const block = document.getElementById(`phrase-${index}`);
    block.classList.add('cleared');
    checkAllPhrasesCleared();
}

function checkAllPhrasesCleared() {
    const total = document.querySelectorAll('.phrase-block').length;
    const cleared = document.querySelectorAll('.phrase-block.cleared').length;
    
    if (total === cleared) {
        const btn = document.getElementById('action-btn');
        btn.innerText = "すべての答え合わせが完了！終了する";
        btn.style.backgroundColor = "#1e88e5";
    }
}

// 終了処理（ホーム画面に戻る）
function finishLearning() {
    const total = document.querySelectorAll('.phrase-block').length;
    const cleared = document.querySelectorAll('.phrase-block.cleared').length;

    if (total !== cleared) {
        alert("まだ確認していない日本語訳があります。すべての区切りをタップしてみましょう！");
        return;
    }
    
    alert("お疲れ様でした！ホーム画面に戻ります。");
    showHomeScreen(); // リロードせず、そのままホーム画面の表示関数を呼ぶ
}

window.onload = loadDataFromSpreadsheet;
</script>

</body>
</html>
