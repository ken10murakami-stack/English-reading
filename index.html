<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>中学生向け 英語長文学習アプリ</title>
    <style>
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            line-height: 1.6;
            background-color: #f5f7fa;
            color: #333;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: #fff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            position: relative; /* ホームボタンの絶対配置のため */
        }
        /* ヘッダーエリアの調整 */
        .header-area {
            text-align: center;
            margin-bottom: 30px;
            padding-right: 100px; /* ボタンと被らないように余白を確保 */
            padding-left: 100px;
        }
        h1 {
            color: #2c3e50;
            font-size: 1.5rem;
            margin: 0;
        }
        /* いつでもホームに戻れるボタン */
        .nav-home-btn {
            position: absolute;
            top: 25px;
            right: 30px;
            background-color: #fff;
            color: #78909c;
            border: 2px solid #cfd8dc;
            padding: 6px 14px;
            font-size: 0.85rem;
            font-weight: bold;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: none;
        }
        .nav-home-btn:hover {
            background-color: #f4f6f7;
            color: #37474f;
            border-color: #b0bec5;
        }
        .mode-info {
            background-color: #e8f4fd;
            color: #1e88e5;
            padding: 12px;
            border-radius: 8px;
            font-weight: bold;
            text-align: center;
            margin-bottom: 20px;
        }
        /* ホーム画面用のスタイル */
        .home-container {
            text-align: center;
            padding: 20px 0;
        }
        .select-group {
            margin-bottom: 20px;
        }
        .select-group label {
            display: block;
            font-weight: bold;
            margin-bottom: 8px;
            color: #555;
        }
        select {
            width: 80%;
            max-width: 300px;
            padding: 10px;
            font-size: 1rem;
            border: 2px solid #b0bec5;
            border-radius: 8px;
            background: white;
            cursor: pointer;
        }
        /* フェーズ1：英文表示エリア */
        .text-container {
            font-size: 1.3rem;
            letter-spacing: 0.05em;
            word-wrap: break-word;
            margin: 40px 0;
            min-height: 50px;
            text-align: left;
            padding: 0 10px;
        }
        /* フェーズ1：単語のスタイル */
        .word-span {
            display: inline-block;
            position: relative;
            cursor: pointer;
            padding: 4px 4px;
            margin-right: 16px; /* スラッシュの色変化が見えやすいよう間隔を広げました */
            border-radius: 4px;
            transition: all 0.2s;
        }
        .word-span:hover:not(.locked) {
            background-color: #e0f2fe;
        }
        
        /* 【通常状態】ユーザーが引いたスラッシュ（赤） */
        .word-span.has-slash::after {
            content: "/";
            position: absolute;
            right: -12px;
            top: 0;
            font-weight: bold;
            color: #ff5252;
            font-size: 1.5rem;
            z-index: 10;
        }

        /* 【答え合わせ後：正解】スラッシュを緑にして固定 */
        .word-span.correct-slash::after {
            content: "/";
            position: absolute;
            right: -12px;
            top: 0;
            font-weight: bold;
            color: #2cc780 !important;
            font-size: 1.5rem;
            z-index: 10;
        }
        .word-span.locked {
            cursor: default;
        }

        /* 【答え合わせ後：不正解（入れてはいけない場所に入れた）】スラッシュをオレンジに */
        .word-span.wrong-slash::after {
            content: "/";
            position: absolute;
            right: -12px;
            top: 0;
            font-weight: bold;
            color: #ffa726 !important; /* オレンジ色 */
            font-size: 1.5rem;
            z-index: 10;
        }

        /* 【答え合わせ後：入れ忘れ（入れるべき場所に無い）】うっすらグレーの点線でナビゲート */
        .word-span.missing-slash::after {
            content: "|";
            position: absolute;
            right: -8px;
            top: 0;
            font-weight: normal;
            color: #b0bec5;
            font-size: 1.4rem;
            opacity: 0.6;
            z-index: 5;
        }

        .line-break {
            display: block;
            margin-top: 15px;
            height: 0;
        }
        .btn-container {
            text-align: center;
            margin-top: 20px;
        }
        button {
            background-color: #2cc780;
            color: white;
            border: none;
            padding: 12px 30px;
            font-size: 1rem;
            font-weight: bold;
            border-radius: 25px;
            cursor: pointer;
            box-shadow: 0 3px 6px rgba(0,0,0,0.1);
            transition: background-color 0.2s;
        }
        button:hover {
            background-color: #21a769;
        }
        /* フェーズ2：直読直解ブロック */
        .phrase-block {
            margin-bottom: 25px;
            padding: 15px;
            border-left: 4px solid #b0bec5;
            background-color: #fafafa;
            cursor: pointer;
            border-radius: 0 8px 8px 0;
            transition: all 0.3s;
        }
        .phrase-block:hover {
            background-color: #f0f4f8;
            border-left-color: #1e88e5;
        }
        .phrase-english {
            font-size: 1.3rem;
            font-weight: 500;
            color: #2c3e50;
        }
        .phrase-translation {
            margin-top: 8px;
            font-size: 1.1rem;
            color: #43a047;
            font-weight: bold;
            display: none;
        }
        .phrase-block.cleared {
            border-left-color: #43a047;
            background-color: #e8f5e9;
        }
        .phrase-block.cleared .phrase-translation {
            display: block;
        }
    </style>
</head>
<body>

<div class="container">
    <button id="nav-home" class="nav-home-btn" onclick="confirmGoHome()" style="display:none;">ホームへ戻る</button>

    <div class="header-area">
        <h1>中学生向け 英語長文学習アプリ</h1>
    </div>
    
    <div id="mode-badge" class="mode-info">
        データを読み込み中...
    </div>

    <div id="main-content"></div>

    <div class="btn-container">
        <button id="action-btn" onclick="checkSlashAnswers()" style="display:none;">スラッシュの答え合わせをする</button>
    </div>
</div>

<script>
// ==========================================================================
// 🛠️ 必須設定: 先ほどGoogle Apps Script（GAS）でデプロイした「ウェブアプリのURL」を貼り付けてください
// ==========================================================================
const SPREADSHEET_GAS_URL = "https://script.google.com/macros/s/AKfycbx1fgY1v0ZToAX7F_vlw02fRml4bQ5VkCe7D5y7AZkJhLX_NOxBclgN7HCPeyKvQL3X/exec";

let allQuestions = [];      
let currentQuestion = { text: "", translations: "" };
let wordsArray = [];        
let correctSlashIndices = []; 

// 1. GAS経由でデータ取得
async function loadDataFromSpreadsheet() {
    if (SPREADSHEET_GAS_URL === "ここにデプロイしたウェブアプリのURLを貼り付け") {
        document.getElementById('mode-badge').innerText = "【設定エラー】コード内のSPREADSHEET_GAS_URLに、GASのウェブアプリURLを設定してください。";
        return;
    }

    try {
        const response = await fetch(SPREADSHEET_GAS_URL);
        allQuestions = await response.json();
        
        if (allQuestions.length > 0) {
            showHomeScreen();
        } else {
            document.getElementById('mode-badge').innerText = "スプレッドシートにデータが見つかりません。";
        }
    } catch (error) {
        console.error("データ取得エラー:", error);
        document.getElementById('mode-badge').innerText = "データの読み込みに失敗しました。GASのURLを確認してください。";
    }
}

// 2. ホーム画面表示
function showHomeScreen() {
    document.getElementById('mode-badge').innerText = "【ホーム】学習したいレベルと文法を選んで「スタート」を押そう！";
    document.getElementById('action-btn').style.display = "none";
    document.getElementById('nav-home').style.display = "none"; // ホーム画面なので戻るボタンは隠す

    const levels = [...new Set(allQuestions.map(q => q.level).filter(l => l))];
    const categories = [...new Set(allQuestions.map(q => q.category).filter(c => c))];

    let htmlMarkup = `
        <div class="home-container">
            <div class="select-group">
                <label for="level-select">学年・レベル</label>
                <select id="level-select">
                    ${levels.map(l => `<option value="${l}">${l}</option>`).join('')}
                </select>
            </div>
            <div class="select-group">
                <label for="category-select">文法カテゴリ</label>
                <select id="category-select">
                    ${categories.map(c => `<option value="${c}">${c}</option>`).join('')}
                </select>
            </div>
            <div class="btn-container" style="margin-top:40px;">
                <button onclick="startSelectedLesson()">この内容でスタート！</button>
            </div>
        </div>
    `;
