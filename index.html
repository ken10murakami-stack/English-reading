<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>中学生向け 英語長文学習アプリ</title>
    <style>
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            line-height: 1.6;
            background-color: #f5f7fa;
            color: #333;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: #fff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }
        h1 {
            text-align: center;
            color: #2c3e50;
            font-size: 1.5rem;
            margin-bottom: 30px;
        }
        /* 状態・案内を表示するバッジ */
        .mode-info {
            background-color: #e8f4fd;
            color: #1e88e5;
            padding: 12px;
            border-radius: 8px;
            font-weight: bold;
            text-align: center;
            margin-bottom: 20px;
        }
        /* フェーズ1：英文表示エリア */
        .text-container {
            font-size: 1.3rem;
            letter-spacing: 0.05em;
            word-wrap: break-word;
            margin: 40px 0;
            min-height: 50px;
            text-align: center;
        }
        /* フェーズ1：単語のスタイル */
        .word-span {
            display: inline-block;
            position: relative;
            cursor: pointer;
            padding: 4px 6px;
            margin-right: 8px;
            border-radius: 4px;
            transition: background-color 0.2s;
        }
        .word-span:hover {
            background-color: #e0f2fe;
        }
        /* 学習者が引いた赤いスラッシュ */
        .word-span.has-slash::after {
            content: "/";
            position: absolute;
            right: -6px;
            top: 0;
            font-weight: bold;
            color: #ff5252;
            font-size: 1.5rem;
            z-index: 10;
        }
        /* ボタンの配置エリア */
        .btn-container {
            text-align: center;
            margin-top: 20px;
        }
        button {
            background-color: #2cc780;
            color: white;
            border: none;
            padding: 12px 30px;
            font-size: 1rem;
            font-weight: bold;
            border-radius: 25px;
            cursor: pointer;
            box-shadow: 0 3px 6px rgba(0,0,0,0.1);
            transition: background-color 0.2s;
        }
        button:hover {
            background-color: #21a769;
        }
        /* フェーズ2：直読直解ブロックのスタイル */
        .phrase-block {
            margin-bottom: 25px;
            padding: 15px;
            border-left: 4px solid #b0bec5;
            background-color: #fafafa;
            cursor: pointer;
            border-radius: 0 8px 8px 0;
            transition: all 0.3s;
        }
        .phrase-block:hover {
            background-color: #f0f4f8;
            border-left-color: #1e88e5;
        }
        .phrase-english {
            font-size: 1.3rem;
            font-weight: 500;
            color: #2c3e50;
        }
        .phrase-translation {
            margin-top: 8px;
            font-size: 1.1rem;
            color: #43a047;
            font-weight: bold;
            display: none; /* 初期は隠す */
        }
