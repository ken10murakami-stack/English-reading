<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>English Reading App</title>
    <style>
        :root { --primary: #3498db; --success: #27ae60; --error: #e74c3c; --bg: #f4f7f6; }
        body { font-family: 'Helvetica Neue', Arial, sans-serif; background-color: var(--bg); margin: 0; padding: 20px; }
        .container { max-width: 850px; margin: 0 auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        
        /* ホーム画面 */
        .home-screen { text-align: center; }
        .filter-group { margin: 25px 0; display: flex; flex-direction: column; gap: 15px; align-items: center; }
        select { padding: 12px; width: 280px; border-radius: 8px; border: 1px solid #ddd; font-size: 1rem; background: white; cursor: pointer; }
        .start-btn { background: var(--success); color: white; padding: 15px 50px; font-size: 1.2rem; border: none; border-radius: 30px; cursor: pointer; transition: 0.3s; font-weight: bold; }
        .start-btn:hover { transform: scale(1.05); background: #219150; }
        #status-msg { margin-top: 15px; color: #666; font-size: 0.9rem; }

        /* 問題画面 */
        .game-screen { display: none; }
        .info-bar { display: flex; justify-content: space-between; color: #666; margin-bottom: 15px; font-size: 0.9rem; border-bottom: 2px solid #f0f0f0; padding-bottom: 10px; }
        .question-text { font-size: 1.25rem; line-height: 2.8; margin-bottom: 30px; padding: 25px; border: 1px solid #eee; border-radius: 12px; background: #fff; white-space: pre-wrap; }
        
        /* 空欄（ドロップ先） */
        .drop-zone {
            display: inline-block;
            min-width: 100px;
            height: 1.8rem;
            border-bottom: 3px solid var(--primary);
            margin: 0 5px;
            vertical-align: middle;
            text-align: center;
            transition: 0.2s;
            background: #fdfdfd;
        }
        .drop-zone.over { background-color: #e3f2fd; border-bottom-style: dashed; }
        .drop-zone.correct { border-bottom-color: var(--success); color: var(--success); font-weight: bold; }
        .drop-zone.incorrect { border-bottom-color: var(--error); }

        /* 語群エリア */
        .word-bank {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            padding: 25px;
            background: #f8f9fa;
            border: 2px dashed #dee2e6;
            border-radius: 12px;
            min-height: 60px;
            justify-content: center;
        }
        .word-chip {
            padding: 8px 20px;
            background: white;
            border: 1px solid #ced4da;
            border-radius: 25px;
            cursor: grab;
            user-select: none;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            font-size: 1.1rem;
            color: #333;
        }
        .word-chip:active { cursor: grabbing; }

        .controls { text-align: center; margin-top: 30px; }
        .btn-check { background: var(--primary); color: white; padding: 12px 45px; border-radius: 30px; border: none; font-size: 1.1rem; cursor: pointer; font-weight: bold; }
        .btn-back { background: #95a5a6; color: white; padding: 8px 20px; border-radius: 5px; border: none; margin-top: 25px; cursor: pointer; }
        #game-msg { margin-bottom: 15px; font-weight: bold; min-height: 1.5rem; }
    </style>
</head>
<body>

<div class="container">
    <div id="home-screen" class="home-screen">
        <h1>📝 English Reading App</h1>
        <p>学習したい「文法」と「レベル」を選んでください</p>
        
        <div class="filter-group">
            <select id="grammar-select">
                <option value="all">すべての文法</option>
            </select>
            <select id="level-select">
                <option value="all">すべてのレベル</option>
            </select>
            <button class="start-btn" onclick="startLesson()">学習をはじめる</button>
        </div>
        <div id="status-msg">データを読み込んでいます...</div>
    </div>

    <div id="game-screen" class="game-screen">
        <div class="info-bar">
            <span id="info-grammar"></span>
            <span id="info-level"></span>
        </div>
        <div id="question-area" class="question-text"></div>
        <p style="text-align:center; color:#888; font-size:0.9rem;">▼ 単語をドラッグして空欄に入れてください</p>
        <div id="word-bank" class="word-bank"></div>
        
        <div class="controls">
            <div id="game-msg"></div>
            <button class="btn-check" onclick="checkAnswers()">答え合わせ</button><br>
            <button class="btn-back" onclick="showHome()">選択画面に戻る</button>
        </div>
    </div>
</div>

<script>
    // ★重要：ここにGASの新しいウェブアプリURLを貼り付けてください
    const API_URL = 'https://script.google.com/macros/s/AKfycbw4FPxI-BanieQxFYZqE5QKotStshl3FiZm7DbRL4gLh8YvirMmNbLbx1D-ZdZbYvBP/exec';
    
    let allQuestions = [];
    let filteredQuestions = [];
    let currentData = null;
    let draggedElement = null;

    // 初期化
    async function init() {
        try {
            const res = await fetch(API_URL);
            allQuestions = await res.json();
            
            // セレクトボックスの選択肢を生成（重複排除＋空値除外）
            populateSelect('grammar-select', 'grammar');
            populateSelect('level-select', 'level');
            document.getElementById('status-msg').innerText = "準備完了！";
        } catch (e) {
            document.getElementById('status-msg').innerText = "データの取得に失敗しました。URLやGASの公開設定を確認してください。";
        }
    }

    function populateSelect(elementId, key) {
        const select = document.getElementById(elementId);
        const values = [...new Set(allQuestions.map(q => q[key] ? q[key].toString().trim() : ""))].filter(v => v !== "");
        values.sort().forEach(v => {
            const opt = document.createElement('option');
            opt.value = v;
            opt.innerText = v;
            select.appendChild(opt);
        });
    }

    // 学習開始（判定強化版）
    function startLesson() {
        const grammarVal = document.getElementById('grammar-select').value;
        const levelVal = document.getElementById('level-select').value;

        filteredQuestions = allQuestions.filter(q => {
            const qGrammar = (q.grammar || "").toString().trim();
            const qLevel = (q.level || "").toString().trim();
            
            const gMatch = (grammarVal === 'all' || qGrammar === grammarVal);
            const lMatch = (levelVal === 'all' || qLevel === levelVal);
            return gMatch && lMatch;
        });

        if (filteredQuestions.length === 0) {
            alert(`該当する問題がありません！\n(選択: ${grammarVal} / ${levelVal})`);
            return;
        }

        document.getElementById('home-screen').style.display = 'none';
        document.getElementById('game-screen').style.display = 'block';
        loadNextQuestion();
    }

    function loadNextQuestion() {
        // 同じ問題が連続しないようにランダム抽出
        currentData = filteredQuestions[Math.floor(Math.random() * filteredQuestions.length)];
        document.getElementById('info-grammar').innerText = `文法: ${currentData.grammar}`;
        document.getElementById('info-level').innerText = `レベル: ${currentData.level}`;
        renderQuestion(currentData);
    }

    function renderQuestion(item) {
        const qArea = document.getElementById('question-area');
        const bank = document.getElementById('word-bank');
        bank.innerHTML = "";
        document.getElementById('game-msg').innerText = "";
        
        // (1), (2) をドロップゾーンに変換
        qArea.innerHTML = item.text.replace(/[\(（](\d+)[\)）]/g, (match, num) => {
            return `<span class="drop-zone" id="zone-${num}" data-ans-num="${num}"></span>`;
        });

        // 語群の準備 (ans1〜ans10まで対応)
        let words = [];
        for(let i=1; i<=10; i++) {
            if(item['ans'+i]) words.push(item['ans'+i].toString().trim());
        }
        words.sort(() => Math.random() - 0.5); // シャッフル

        words.forEach(word => {
            const chip = document.createElement('div');
            chip.className = 'word-chip';
            chip.draggable = true;
            chip.innerText = word;
            chip.addEventListener('dragstart', e => { draggedElement = chip; });
            bank.appendChild(chip);
        });

        setupDropZones();
    }

    function setupDropZones() {
        const zones = document.querySelectorAll('.drop-zone');
        zones.forEach(zone => {
            zone.addEventListener('dragover', e => e.preventDefault());
            zone.addEventListener('dragenter', e => zone.classList.add('over'));
            zone.addEventListener('dragleave', () => zone.classList.remove('over'));
            zone.addEventListener('drop', e => {
                e.preventDefault();
                zone.classList.remove('over');
                // 既にある場合は語群に戻す
                if(zone.firstChild) document.getElementById('word-bank').appendChild(zone.firstChild);
                zone.appendChild(draggedElement);
            });
        });
    }

    function checkAnswers() {
        const zones = document.querySelectorAll('.drop-zone');
        let allCorrect = true;
        let filledCount = 0;

        zones.forEach(zone => {
            if(!zone.firstChild) return;
            filledCount++;
            
            const num = zone.dataset.ansNum;
            const userAnswer = zone.innerText.trim().toLowerCase();
            const correctAnswer = currentData['ans'+num].toString().trim().toLowerCase();

            if(userAnswer === correctAnswer) {
                zone.className = 'drop-zone correct';
                zone.firstChild.draggable = false;
            } else {
                zone.className = 'drop-zone incorrect';
                // 間違えたら0.8秒後に戻す
                setTimeout(() => {
                    if(zone.classList.contains('incorrect') && zone.firstChild) {
                        document.getElementById('word-bank').appendChild(zone.firstChild);
                        zone.className = 'drop-zone';
                    }
                }, 800);
                allCorrect = false;
            }
        });

        const msg = document.getElementById('game-msg');
        if(filledCount < zones.length) {
            msg.innerText = "すべての空欄を埋めてください。";
            msg.style.color = "orange";
        } else if(allCorrect) {
            msg.innerHTML = "<span style='color:green;'>🎉 正解です！次の問題へ...</span>";
            setTimeout(loadNextQuestion, 2000);
        } else {
            msg.innerText = "間違いがあります。単語が戻りました。";
            msg.style.color = "red";
        }
    }

    function showHome() {
        document.getElementById('home-screen').style.display = 'block';
        document.getElementById('game-screen').style.display = 'none';
    }

    init();
</script>
</body>
</html>
